<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>
    <h1>Calculadora Simples</h1>

    <form>
        <label for="valor1">Valor 1:</label>
        <input type="number" name="valor1" id="valor1" required>

        <label for="valor2">Valor 2:</label>
        <input type="number" name="valor2" id="valor2" required>

        <div>
            <button class="btn" type="button" onclick="calcular('+')">+</button>
            <button class="btn" type="button" onclick="calcular('-')">-</button>
            <button class="btn" type="button" onclick="calcular('*')">X</button>
            <button class="btn" type="button" onclick="calcular('/')">/</button>
        </div>
    </form>
    <h2 id="resultado">Resultado: </h2>
    <script src="script.js"></script>
</body>

</html>
